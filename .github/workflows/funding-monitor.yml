name: Aethl Funding Monitor

# Runs every Monday at 12:00 UTC, plus a manual "Run workflow" button.
# State (which powers NEW / REMOVED detection) is committed back to the repo
# so it reliably persists across weekly runs.
on:
  schedule:
    - cron: "0 12 * * 1"      # weekly, Mondays 12:00 UTC
  workflow_dispatch:           # lets you trigger a run manually

permissions:
  contents: write              # needed to commit state + tracker back

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install openpyxl pypdf

      - name: Run monitor and rebuild tracker
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          SAM_API_KEY_2: ${{ secrets.SAM_API_KEY_2 }}
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
          MONDAY_BOARD_ID: ${{ secrets.MONDAY_BOARD_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 aethl_funding_monitor.py --push
          python3 build_tracker_xlsx.py

      - name: Commit updated state + tracker
        run: |
          git config user.name  "funding-monitor-bot"
          git config user.email "actions@github.com"
          git add opportunities_state.json opportunities.json opportunities.csv \
                  opportunities_removed.json Aethl_Funding_Tracker.xlsx 2>/dev/null || true
          git commit -m "Weekly funding update: $(date -u +%Y-%m-%d)" || echo "No changes"
          git push || echo "Nothing to push"

      - name: Upload tracker as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: aethl-funding-tracker
          path: |
            Aethl_Funding_Tracker.xlsx
            opportunities.csv

